<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>All Assets Tracker</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/favicon-180.png">
<style>
  :root {
    --border: #e4e4e7;
    --text: #18181b;
    --muted: #71717a;
    --pos: #16a34a;
    --neg: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: #fafafa;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: #fff;
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }
  .filters label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
  }
  main { padding: 20px 48px 60px; }
  header { padding: 14px 48px; }
  footer { padding: 14px 48px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    table-layout: fixed;
  }
  th, td {
    padding: 8px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th:nth-child(1), th:nth-child(2),
  td:nth-child(1), td:nth-child(2) { text-align: left; }
  th:nth-child(1), td:nth-child(1) { width: 56px; }
  th:nth-child(3), td:nth-child(3),
  th:nth-child(4), td:nth-child(4) { width: 110px; }
  th:nth-child(5), td:nth-child(5),
  th:nth-child(6), td:nth-child(6),
  th:nth-child(7), td:nth-child(7),
  th:nth-child(8), td:nth-child(8) { width: 80px; }
  td:nth-child(2) strong {
    display: inline-block;
    max-width: calc(100% - 130px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: middle;
  }
  th {
    background: #f4f4f5;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  th .arrow { color: var(--muted); margin-left: 4px; font-size: 11px; }
  tr.category-public    { background: #ffffff; }
  tr.category-private   { background: #f4f4f5; }
  tr.category-crypto    { background: #f5f0fa; }
  tr.category-commodity { background: #fdf6dc; }
  tr.category-fiat      { background: #eef7ee; }
  tr.category-misc      { background: #eef3fb; }
  tbody tr { transition: box-shadow 120ms ease; }
  tbody tr:hover {
    box-shadow: inset 0 0 0 9999px rgba(0, 0, 0, 0.04);
  }
  .ticker { color: var(--muted); margin-left: 6px; font-size: 12px; }
  .icon {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    object-fit: contain;
    vertical-align: middle;
    margin-right: 8px;
  }
  .icon[data-fallback] { display: none; }
  .casa-logo-link { display: inline-block; line-height: 0; }
  .casa-logo {
    width: 14px;
    height: 14px;
    vertical-align: -3px;
    margin-left: 4px;
  }
  .cat-tag {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(0,0,0,0.04);
    letter-spacing: 0.04em;
  }
  .method-icon {
    position: relative;
    display: inline-flex;
    vertical-align: middle;
    margin-left: 6px;
    color: var(--muted);
  }
  .method-icon svg { display: block; }
  .method-icon::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #18181b;
    color: #fafafa;
    font-size: 11px;
    line-height: 1.3;
    padding: 5px 8px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 80ms ease;
    z-index: 10;
  }
  .method-icon:hover::after { opacity: 1; }
  .pos { color: var(--pos); }
  .neg { color: var(--neg); }
  .muted { color: var(--muted); }
  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: 0;
  }
  .live-dot.ok  { background: var(--pos); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.5); animation: pulse 2s infinite; }
  .live-dot.err { background: var(--neg); }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(22, 163, 74, 0); }
    100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
  }
  footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: #fff;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky;
    bottom: 0;
  }
</style>
</head>
<body>
<header>
  <div class="filters" id="filters">
    <label><input type="checkbox" data-cat="public" checked>Public companies</label>
    <label><input type="checkbox" data-cat="private" checked>Private companies</label>
    <label><input type="checkbox" data-cat="crypto" checked>Crypto</label>
    <label><input type="checkbox" data-cat="commodity" checked>Commodities</label>
    <label><input type="checkbox" data-cat="fiat" checked>Fiat (M2)</label>
    <label><input type="checkbox" data-cat="misc" checked>Misc</label>
  </div>
</header>
<main>
  <table>
    <thead>
      <tr id="head">
        <th data-key="rank">#</th>
        <th data-key="name">Name</th>
        <th data-key="market_cap_usd">Market Cap<span class="arrow">▼</span></th>
        <th data-key="price_usd">Price</th>
        <th data-key="change_24h">24h %</th>
        <th data-key="change_7d">7d %</th>
        <th data-key="change_30d">30d %</th>
        <th data-key="change_1y">1y %</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</main>
<footer>
  <span id="status">Loading…</span>
  <span>Made by <a href="https://araoz.net" target="_blank" rel="noopener">Casa Araoz</a> <a href="https://araoz.net" target="_blank" rel="noopener" class="casa-logo-link"><img src="/icons/casa-araoz.png" alt="" class="casa-logo"></a></span>
</footer>
<script>
const state = {
  assets: [],
  lastUpdated: 0,
  connected: true,
  sortKey: "market_cap_usd",
  sortDir: -1,
  filters: { public: true, private: true, crypto: true, commodity: true, fiat: true, misc: true },
};

const STORAGE_KEY = "assets-tracker-state-v1";
const ALL_CATS = ["public", "private", "crypto", "commodity", "fiat", "misc"];

// Short codes for compact URLs. Two letters because public/private and
// crypto/commodity collide on the first letter.
const CAT_SHORT = { public: "pu", private: "pr", crypto: "cr", commodity: "co", fiat: "fi", misc: "mi" };
const CAT_LONG = Object.fromEntries(Object.entries(CAT_SHORT).map(([k, v]) => [v, k]));

const KEY_SHORT = {
  name: "n", market_cap_usd: "mc", price_usd: "p",
  change_24h: "c1", change_7d: "c7", change_30d: "c30", change_1y: "cy",
};
const KEY_LONG = Object.fromEntries(Object.entries(KEY_SHORT).map(([k, v]) => [v, k]));

function parseHash() {
  const out = new Map();
  const raw = location.hash.replace(/^#/, "");
  if (!raw) return out;
  for (const piece of raw.split("&")) {
    const idx = piece.indexOf("=");
    if (idx === -1) continue;
    out.set(piece.slice(0, idx), decodeURIComponent(piece.slice(idx + 1)));
  }
  return out;
}

function loadInitialState() {
  const params = parseHash();

  if (params.has("c")) {
    const on = new Set(params.get("c").split(",").map(s => CAT_LONG[s]).filter(Boolean));
    ALL_CATS.forEach(c => { state.filters[c] = on.has(c); });
  } else {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved.filters) {
          ALL_CATS.forEach(c => {
            if (typeof saved.filters[c] === "boolean") state.filters[c] = saved.filters[c];
          });
        }
        if (typeof saved.sortKey === "string") state.sortKey = saved.sortKey;
        if (saved.sortDir === 1 || saved.sortDir === -1) state.sortDir = saved.sortDir;
      }
    } catch {}
  }

  if (params.has("s")) {
    let s = params.get("s");
    let dir = 1;  // bare = asc
    if (s.startsWith("-"))      { dir = -1; s = s.slice(1); }
    else if (s.startsWith("+")) { dir =  1; s = s.slice(1); }
    const longKey = KEY_LONG[s];
    if (longKey) {
      state.sortKey = longKey;
      state.sortDir = dir;
    }
  }

  document.querySelectorAll("#filters input").forEach(el => {
    el.checked = !!state.filters[el.dataset.cat];
  });
}

function persistState() {
  // Build the hash by hand so commas stay literal (URLSearchParams encodes
  // them as %2C, which is ugly in shareable URLs).
  const parts = [];
  const offCount = ALL_CATS.filter(c => !state.filters[c]).length;
  if (offCount > 0) {
    const on = ALL_CATS.filter(c => state.filters[c]).map(c => CAT_SHORT[c]);
    parts.push("c=" + on.join(","));
  }
  if (state.sortKey !== "market_cap_usd" || state.sortDir !== -1) {
    const k = KEY_SHORT[state.sortKey] || state.sortKey;
    const sign = state.sortDir === -1 ? "-" : "+";
    parts.push("s=" + sign + k);
  }
  const hash = parts.length ? "#" + parts.join("&") : "";
  history.replaceState(null, "", location.pathname + hash);

  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      filters: state.filters,
      sortKey: state.sortKey,
      sortDir: state.sortDir,
    }));
  } catch {}
}

const fmtMcap = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return "—";
  const abs = Math.abs(v);
  if (abs >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T";
  if (abs >= 1e9)  return "$" + (v / 1e9).toFixed(2)  + "B";
  if (abs >= 1e6)  return "$" + (v / 1e6).toFixed(2)  + "M";
  return "$" + Math.round(v).toLocaleString();
};

const fmtPrice = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return "—";
  if (v >= 1000) return "$" + v.toLocaleString(undefined, { maximumFractionDigits: 0 });
  if (v >= 1) return "$" + v.toFixed(2);
  if (v >= 0.01) return "$" + v.toFixed(4);
  return "$" + v.toPrecision(3);
};

const fmtPct = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return '<span class="muted">—</span>';
  const sign = v >= 0 ? "+" : "";
  const cls = v >= 0 ? "pos" : "neg";
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
};

const catLabel = {
  public: "public", private: "private", crypto: "crypto",
  commodity: "commodity", fiat: "fiat M2", misc: "misc",
};

// Keyed row map so we never recreate <tr> / <img> elements across renders;
// rebuilding the DOM every tick made every <img> re-decode and flicker.
const rowMap = new Map();  // ticker -> { tr, cells, lastCategory }

function buildRow(a) {
  const tr = document.createElement("tr");
  tr.className = `category-${a.category}`;

  const cells = {};
  cells.rank  = tr.insertCell();
  cells.name  = tr.insertCell();
  cells.mcap  = tr.insertCell();
  cells.price = tr.insertCell();
  cells.ch24  = tr.insertCell();
  cells.ch7   = tr.insertCell();
  cells.ch30  = tr.insertCell();
  cells.ch1y  = tr.insertCell();

  const iconImg = a.icon_url
    ? `<img class="icon" src="${escapeHtml(a.icon_url)}" alt="" loading="lazy" onerror="this.setAttribute('data-fallback','1')">`
    : "";
  // Misc/private/commodity tickers are synthetic labels (GLOBAL_BONDS, OPENAI,
  // GOLD…) — hide them. Public/crypto/fiat tickers are real, keep.
  const realTickerCategories = new Set(["public", "crypto", "fiat"]);
  const tickerSpan = realTickerCategories.has(a.category) && a.ticker
    ? ` <span class="ticker">${escapeHtml(a.ticker)}</span>`
    : "";
  cells.name.innerHTML =
    iconImg +
    `<strong>${escapeHtml(a.name || "")}</strong>` +
    tickerSpan +
    ` <span class="cat-tag">${catLabel[a.category] || a.category}</span>` +
    methodIcon(a.method);

  return { tr, cells, lastCategory: a.category };
}

function updateRow(entry, a, rank) {
  if (entry.lastCategory !== a.category) {
    entry.tr.className = `category-${a.category}`;
    entry.lastCategory = a.category;
  }
  const c = entry.cells;
  c.rank.textContent  = rank;
  c.mcap.textContent  = fmtMcap(a.market_cap_usd);
  c.price.textContent = fmtPrice(a.price_usd);
  c.ch24.innerHTML    = fmtPct(a.change_24h);
  c.ch7.innerHTML     = fmtPct(a.change_7d);
  c.ch30.innerHTML    = fmtPct(a.change_30d);
  c.ch1y.innerHTML    = fmtPct(a.change_1y);
}

function render() {
  const visible = state.assets.filter(a => state.filters[a.category]);

  // Rank is always by market cap among the visible set, regardless of how
  // the user is sorting — Gold stays #3 even when you sort by name.
  const mcapRank = new Map();
  [...visible]
    .sort((a, b) => {
      const av = a.market_cap_usd, bv = b.market_cap_usd;
      const aNull = av == null || !isFinite(av);
      const bNull = bv == null || !isFinite(bv);
      if (aNull && bNull) return 0;
      if (aNull) return 1;
      if (bNull) return -1;
      return bv - av;
    })
    .forEach((a, i) => mcapRank.set(a, i + 1));

  const dir = state.sortDir;
  const key = state.sortKey;
  visible.sort((a, b) => {
    const av = a[key];
    const bv = b[key];
    const aNull = av === null || av === undefined || (typeof av === "number" && !isFinite(av));
    const bNull = bv === null || bv === undefined || (typeof bv === "number" && !isFinite(bv));
    if (aNull && bNull) return 0;
    if (aNull) return 1;
    if (bNull) return -1;
    if (typeof av === "string" || typeof bv === "string") {
      return String(av).localeCompare(String(bv)) * dir;
    }
    return (av - bv) * dir;
  });

  const tbody = document.getElementById("rows");

  if (visible.length === 0) {
    rowMap.clear();
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--muted)">No assets match current filters.</td></tr>`;
    updateSortIndicators();
    updateStatus();
    return;
  }

  const seen = new Set();
  const frag = document.createDocumentFragment();
  visible.forEach((a, i) => {
    seen.add(a.ticker);
    let entry = rowMap.get(a.ticker);
    if (!entry) {
      entry = buildRow(a);
      rowMap.set(a.ticker, entry);
    }
    updateRow(entry, a, mcapRank.get(a) || (i + 1));
    frag.appendChild(entry.tr);  // appendChild moves nodes, doesn't clone
  });

  // Drop rows that fell out of the visible set (filter unchecked, or asset gone)
  for (const [ticker, entry] of rowMap) {
    if (!seen.has(ticker)) {
      entry.tr.remove();
      rowMap.delete(ticker);
    }
  }

  tbody.appendChild(frag);
  updateSortIndicators();
  updateStatus();
}

function methodIcon(method) {
  if (method === "stock") {
    return `<span class="method-icon" data-tip="Above-ground stock × spot price" aria-label="stock">`
      + `<svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor">`
      + `<rect x="3" y="11" width="10" height="2" rx="0.5"/>`
      + `<rect x="4" y="8" width="8" height="2" rx="0.5"/>`
      + `<rect x="5" y="5" width="6" height="2" rx="0.5"/>`
      + `</svg></span>`;
  }
  if (method === "flow") {
    return `<span class="method-icon" data-tip="Annual production × spot price" aria-label="flow">`
      + `<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">`
      + `<path d="M12.5 8 a4.5 4.5 0 1 1 -1.4 -3.2"/>`
      + `<path d="M12.5 3 L12.5 5.5 L10 5.5" stroke-linejoin="round"/>`
      + `</svg></span>`;
  }
  return "";
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function updateSortIndicators() {
  document.querySelectorAll("#head th").forEach(th => {
    const arrow = th.querySelector(".arrow");
    if (arrow) arrow.remove();
    if (th.dataset.key === state.sortKey) {
      const a = document.createElement("span");
      a.className = "arrow";
      a.textContent = state.sortDir === -1 ? "▼" : "▲";
      th.appendChild(a);
    }
  });
}

function updateStatus() {
  const el = document.getElementById("status");
  if (!state.lastUpdated && state.connected) {
    el.innerHTML = `<span class="live-dot ok" title="Connecting…"></span>Loading…`;
    return;
  }
  const ago = Math.max(0, Math.round(Date.now() / 1000 - state.lastUpdated));
  if (state.connected) {
    el.innerHTML = `<span class="live-dot ok" title="Live — server reachable, last update ${ago}s ago"></span>${state.assets.length} assets`;
  } else {
    el.innerHTML = `<span class="live-dot err" title="Lost connection to server — showing last known data from ${ago}s ago"></span>${state.assets.length} assets`;
  }
}

document.querySelectorAll("#head th").forEach(th => {
  th.addEventListener("click", () => {
    const key = th.dataset.key;
    if (!key || key === "rank") return;
    if (state.sortKey === key) state.sortDir *= -1;
    else { state.sortKey = key; state.sortDir = -1; }
    persistState();
    render();
  });
});

document.querySelectorAll("#filters input").forEach(el => {
  el.addEventListener("change", () => {
    state.filters[el.dataset.cat] = el.checked;
    persistState();
    render();
  });
});

async function refresh() {
  try {
    const r = await fetch("/api/assets");
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    state.assets = data.assets || [];
    state.lastUpdated = data.last_updated || 0;
    state.connected = true;
    render();
  } catch (e) {
    console.error("fetch failed", e);
    state.connected = false;
    updateStatus();
  }
}

loadInitialState();
refresh();
setInterval(refresh, 30000);
setInterval(updateStatus, 1000);
</script>
</body>
</html>
