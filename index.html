<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Activos</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/favicon-180.png">
<link href="/fonts/fonts.css" rel="stylesheet">
<style>
  :root {
    /* Surfaces */
    --bg:        #f4f0e8;
    --bg-2:      #ece7dc;
    --card:      #fdfcf8;
    --card-2:    #faf7ee;

    /* Ink */
    --ink:       #1a1a1a;
    --ink-2:     #2a2a2a;
    --ink-3:     #5a5a5a;
    --ink-mute:  #8a8378;

    /* Rules */
    --rule:      #d9d2c4;
    --rule-soft: #e6dfd0;

    /* Semantic */
    --pos:       #1a7a3e;
    --neg:       #b7300d;
    --live-dot:  #22a861;

    /* Honey accent */
    --accent-tint: #FBE9A6;
    --accent-row:  #FFF7DA;
    --accent-chip: #F4E29B;
    --accent-text: #3a2a07;

    /* Type */
    --sans: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.5), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(0,0,0,0.015), transparent 40%);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 28px 64px;
  }

  /* ───── HERO ───── */
  .hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 4px 0 14px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .hero-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .hero-crest { display: inline-flex; align-items: center; }
  .hero-title {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 20px;
    letter-spacing: -0.015em;
    line-height: 1.1;
    margin: 0;
    color: var(--ink);
  }
  .hero-tag {
    font-family: var(--sans);
    font-size: 12.5px;
    color: var(--ink-mute);
    margin: 0;
    line-height: 1.4;
  }
  .hero-stats {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-shrink: 0;
  }
  .stat { display: inline-flex; align-items: baseline; gap: 6px; }
  .stat-num {
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .stat-sep { color: var(--ink-mute); opacity: 0.5; }

  /* ───── TOOLBAR ───── */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 18px 0 14px;
    align-items: center;
  }
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 9px 14px;
    width: min(520px, 100%);
    color: var(--ink-mute);
    box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 4px 14px -8px rgba(0,0,0,0.08);
    transition: border-color 120ms, box-shadow 120ms;
  }
  .search:focus-within {
    border-color: var(--ink-2);
    box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 6px 18px -8px rgba(0,0,0,0.18);
  }
  .search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink);
  }
  .search input::placeholder { color: var(--ink-mute); }

  .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  /* Off = transparent outline, muted text, empty box. On = soft per-category
     tint, dark text, dark-filled box with light check. */
  .ftr-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 4px 11px 4px 8px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-mute);
    cursor: pointer;
    transition: all 120ms;
    user-select: none;
  }
  .ftr-chip:hover { color: var(--ink-3); border-color: var(--ink-mute); }
  .ftr-chk {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    border: 1.2px solid var(--ink-mute);
    background: transparent;
    display: inline-grid;
    place-items: center;
    color: transparent;
    flex-shrink: 0;
    transition: all 120ms;
  }
  .ftr-chip[data-active="true"] .ftr-chk {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--card);
  }
  /* Each chip's active fill matches its category row tint, with a darker
     same-hue text. Quiet enough to coexist, distinctive per category. */
  .ftr-chip[data-active="true"][data-cat="public"]    { background: #ffffff; border-color: #e6e0d0; color: var(--ink); }
  .ftr-chip[data-active="true"][data-cat="commodity"] { background: #fbf3df; border-color: #ebe1bc; color: #5c4515; }
  .ftr-chip[data-active="true"][data-cat="fiat"]      { background: #eaf3e6; border-color: #cbe1c1; color: #20461d; }
  .ftr-chip[data-active="true"][data-cat="crypto"]    { background: #f1ecfb; border-color: #d8cdee; color: #3a2270; }
  .ftr-chip[data-active="true"][data-cat="private"]   { background: #fbecec; border-color: #edc8c8; color: #6d2222; }
  .ftr-chip[data-active="true"][data-cat="misc"]      { background: #f3eee5; border-color: #d6cbb6; color: #4d3f25; }

  .ftr-count {
    font-variant-numeric: tabular-nums;
    font-size: 10.5px;
    color: var(--ink-mute);
    opacity: 0.7;
  }
  .ftr-chip[data-active="true"] .ftr-count {
    color: currentColor;
    opacity: 0.55;
  }

  /* ───── CARD / TABLE ───── */
  .card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 14px;
    /* No overflow: hidden — that would trap thead's position:sticky inside
       the card. Headers should stick to the page scroll instead. */
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 1px 2px rgba(0,0,0,0.03),
      0 24px 60px -32px rgba(40,30,10,0.18);
    margin-top: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: transparent;
    table-layout: fixed;
  }
  th, td {
    padding: 0 10px;
    text-align: right;
    white-space: nowrap;
    height: 42px;
  }
  th:first-child, td:first-child { padding-left: 18px; }
  th:last-child,  td:last-child  { padding-right: 18px; }
  th:nth-child(1), th:nth-child(2),
  td:nth-child(1), td:nth-child(2) { text-align: left; }
  th:nth-child(1), td:nth-child(1) { width: 56px; }
  th:nth-child(3), td:nth-child(3) { width: 130px; }
  th:nth-child(4), td:nth-child(4) { width: 110px; }
  th:nth-child(5), td:nth-child(5),
  th:nth-child(6), td:nth-child(6),
  th:nth-child(7), td:nth-child(7),
  th:nth-child(8), td:nth-child(8) { width: 80px; }
  thead th {
    background: var(--card-2);
    border-bottom: 1px solid var(--rule);
    font-weight: 600;
    font-size: 11px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  thead th:first-child { border-top-left-radius: 14px; }
  thead th:last-child  { border-top-right-radius: 14px; }
  tbody tr:last-child td:first-child { border-bottom-left-radius: 14px; }
  tbody tr:last-child td:last-child  { border-bottom-right-radius: 14px; }
  thead th[data-key="rank"], thead th[data-key="name"] { cursor: default; }
  thead th:hover[data-sortable="1"] { color: var(--ink); }
  thead th[data-sort-active="1"] { color: var(--ink); }
  .sort-mark { font-size: 9px; margin-left: 2px; }
  .sort-mark.muted { opacity: 0.3; }
  tbody td {
    border-bottom: 1px solid var(--rule-soft);
    font-size: 14px;
    color: var(--ink);
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  tbody tr:last-child td { border-bottom: 0; }

  /* class tints */
  tr.category-public    { background: transparent; }
  tr.category-commodity { background: #fbf3df; }
  tr.category-fiat      { background: #eaf3e6; }
  tr.category-crypto    { background: #f1ecfb; }
  tr.category-private   { background: #fbecec; }
  tr.category-misc      { background: #f3eee5; }
  /* Hover stays in the row's own category tint, just slightly darker. The
     inset shadow tints any underlying color uniformly without picking a
     fixed color, so each category's tint is preserved. */
  tbody tr { transition: box-shadow 100ms; }
  tbody tr:hover { box-shadow: inset 0 0 0 9999px rgba(0, 0, 0, 0.05); }

  td:nth-child(1) {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-mute);
  }
  td:nth-child(2) {
    overflow: hidden;
  }
  .name-cell {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .icon[data-fallback] { display: none; }
  .name-stack {
    display: flex;
    flex-direction: column;
    min-width: 0;
    line-height: 1.2;
  }
  .name {
    font-size: 14px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tkr-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .tkr {
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    color: var(--accent-text);
    background: var(--accent-tint);
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.02em;
  }
  .tkr-type {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  td:nth-child(3) { font-weight: 600; }

  .pos { color: var(--pos); }
  .neg { color: var(--neg); }
  .muted { color: var(--ink-mute); }

  /* method tooltip glyph */
  .method-icon {
    position: relative;
    display: inline-flex;
    vertical-align: middle;
    margin-left: 6px;
    color: var(--ink-mute);
  }
  .method-icon svg { display: block; }
  .method-icon::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--card);
    font-size: 11px;
    line-height: 1.3;
    padding: 5px 8px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 80ms ease;
    z-index: 10;
  }
  .method-icon:hover::after { opacity: 1; }

  /* ───── STICKY FOOTER ───── */
  .foot {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: rgba(236, 231, 220, 0.88);
    border-top: 1px solid var(--rule);
    padding: 8px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    color: var(--ink-3);
    font-size: 12px;
    z-index: 10;
    backdrop-filter: blur(6px);
  }
  .foot-left, .foot-right { display: flex; align-items: center; gap: 8px; }
  .foot-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--live-dot);
    box-shadow: 0 0 0 3px rgba(34,168,97,0.18);
    display: inline-block;
    cursor: default;
  }
  .foot-dot.err {
    background: var(--neg);
    box-shadow: 0 0 0 3px rgba(183,48,13,0.18);
  }
  .foot-count {
    font-size: 12px;
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
  }
  .foot-right p { margin: 0; display: inline-flex; align-items: center; gap: 6px; }
  .foot-right .author { color: var(--ink); font-weight: 600; text-decoration: none; }
  .foot-right .author:hover { text-decoration: underline; text-underline-offset: 3px; }
  .foot-crest { display: inline-flex; align-items: center; line-height: 0; }

  /* empty-state / loading-state crest */
  .crest-empty {
    opacity: 0.35;
    filter: grayscale(1);
    display: block;
    margin: 0 auto 12px;
  }
  .crest-pulse { animation: crest-pulse 1.6s ease-in-out infinite; }
  @keyframes crest-pulse {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 0.55; }
  }

  /* responsive */
  /* Staircase the column hides so the Name column grows in single-column
     steps instead of all 240px at once. */

  /* ≤880px: hide 1y → 7d is rightmost */
  @media (max-width: 880px) {
    .page { padding: 18px 14px 64px; }
    .hero-tag { display: none; }
    .hero-title { font-size: 16px; }
    .hero-stats { font-size: 12px; gap: 10px; }
    th:nth-child(8), td:nth-child(8) { display: none; }
    thead th:nth-child(7) { border-top-right-radius: 14px; }
    tbody tr:last-child td:nth-child(7) { border-bottom-right-radius: 14px; }
  }

  /* ≤720px: also hide 30d → 7d still rightmost (but col 7 hidden, so 6) */
  @media (max-width: 720px) {
    th:nth-child(7), td:nth-child(7) { display: none; }
    thead th:nth-child(6) { border-top-right-radius: 14px; }
    tbody tr:last-child td:nth-child(6) { border-bottom-right-radius: 14px; }
  }

  /* ≤600px: also hide 7d → 24h (col 5) is rightmost */
  @media (max-width: 600px) {
    th:nth-child(6), td:nth-child(6) { display: none; }
    th:nth-child(5), td:nth-child(5) { padding-right: 14px; }
    thead th:nth-child(5) { border-top-right-radius: 14px; }
    tbody tr:last-child td:nth-child(5) { border-bottom-right-radius: 14px; }
    th:nth-child(1), td:nth-child(1) { width: 40px; padding-left: 14px; }
    th:nth-child(3), td:nth-child(3) { width: 110px; }
    th:nth-child(4), td:nth-child(4) { width: 90px; }
    th:nth-child(5), td:nth-child(5) { width: 70px; }
    th, td { font-size: 12.5px; }
    .icon { width: 20px; height: 20px; }
  }

  /* ≤540px: also hide Price → 24h still rightmost */
  @media (max-width: 540px) {
    .hero-stats .stat:not(:first-child),
    .hero-stats .stat-sep { display: none; }
    th:nth-child(4), td:nth-child(4) { display: none; }
    .tkr-type { display: none; }
    .name { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="hero">
    <div class="hero-left">
      <span class="hero-crest" aria-hidden>
        <img src="/icons/casa-araoz.svg" alt="" width="24" height="28">
      </span>
      <h1 class="hero-title">Activos</h1>
      <p class="hero-tag">Every asset ranked by market cap.</p>
    </div>
    <div class="hero-stats" id="hero-stats">
      <div class="stat"><span class="stat-num" id="hero-count">—</span><span class="stat-lbl">assets tracked</span></div>
      <span class="stat-sep">·</span>
      <div class="stat"><span class="stat-num" id="hero-mcap">—</span><span class="stat-lbl">total market cap</span></div>
      <span class="stat-sep">·</span>
      <div class="stat"><span class="stat-num" id="hero-updated">—</span><span class="stat-lbl">last updated</span></div>
    </div>
  </header>

  <div class="toolbar">
    <label class="search">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden>
        <circle cx="6" cy="6" r="4.2" fill="none" stroke="currentColor" stroke-width="1.4"/>
        <path d="M9.2 9.2 L12.5 12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search by name or ticker…" autocomplete="off">
    </label>
    <div class="chips" id="filters"></div>
  </div>

  <main class="card">
    <table>
      <thead>
        <tr id="head">
          <th data-key="rank">#</th>
          <th data-key="name">Name</th>
          <th data-key="market_cap_usd" data-sortable="1">Market Cap</th>
          <th data-key="price_usd" data-sortable="1">Price</th>
          <th data-key="change_24h" data-sortable="1">24h</th>
          <th data-key="change_7d" data-sortable="1">7d</th>
          <th data-key="change_30d" data-sortable="1">30d</th>
          <th data-key="change_1y" data-sortable="1">1y</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>
</div>

<footer class="foot">
  <div class="foot-left">
    <span class="foot-dot" id="status-dot" title="Live"></span>
    <span class="foot-count" id="status-count">— assets</span>
  </div>
  <div class="foot-right">
    <p>
      <span>Made by</span>
      <a class="author" href="https://araoz.net" target="_blank" rel="noopener">Casa Araoz</a>
      <a class="foot-crest" href="https://araoz.net" target="_blank" rel="noopener" aria-hidden>
        <img src="/icons/casa-araoz.svg" alt="" width="14" height="14">
      </a>
    </p>
  </div>
</footer>

<script>
const state = {
  assets: [],
  lastUpdated: 0,
  connected: true,
  sortKey: "market_cap_usd",
  sortDir: -1,
  filters: { public: true, private: true, crypto: true, commodity: true, fiat: true, misc: true },
  query: "",  // search text, ephemeral (not persisted)
};

const ALL_CATS = ["public", "private", "crypto", "commodity", "fiat", "misc"];

const CHIP_LABELS = {
  public: "Public companies", private: "Private companies", crypto: "Crypto",
  commodity: "Commodities", fiat: "Fiat (M2)", misc: "Misc",
};

const CAT_SHORT = { public: "pu", private: "pr", crypto: "cr", commodity: "co", fiat: "fi", misc: "mi" };
const CAT_LONG = Object.fromEntries(Object.entries(CAT_SHORT).map(([k, v]) => [v, k]));

const KEY_SHORT = {
  market_cap_usd: "mc", price_usd: "p",
  change_24h: "c1", change_7d: "c7", change_30d: "c30", change_1y: "cy",
};
const KEY_LONG = Object.fromEntries(Object.entries(KEY_SHORT).map(([k, v]) => [v, k]));

function parseHash() {
  const out = new Map();
  const raw = location.hash.replace(/^#/, "");
  if (!raw) return out;
  for (const piece of raw.split("&")) {
    const idx = piece.indexOf("=");
    if (idx === -1) continue;
    out.set(piece.slice(0, idx), decodeURIComponent(piece.slice(idx + 1)));
  }
  return out;
}

function loadInitialState() {
  // URL hash is the only source of state. No localStorage — visiting a clean
  // URL always starts fresh (all filters on, default sort).
  const params = parseHash();
  if (params.has("c")) {
    const on = new Set(params.get("c").split(",").map(s => CAT_LONG[s]).filter(Boolean));
    ALL_CATS.forEach(c => { state.filters[c] = on.has(c); });
  }
  if (params.has("s")) {
    let s = params.get("s");
    let dir = 1;
    if (s.startsWith("-"))      { dir = -1; s = s.slice(1); }
    else if (s.startsWith("+")) { dir =  1; s = s.slice(1); }
    const longKey = KEY_LONG[s];
    if (longKey) { state.sortKey = longKey; state.sortDir = dir; }
  }
}

function persistState() {
  const parts = [];
  const offCount = ALL_CATS.filter(c => !state.filters[c]).length;
  if (offCount > 0) {
    const on = ALL_CATS.filter(c => state.filters[c]).map(c => CAT_SHORT[c]);
    parts.push("c=" + on.join(","));
  }
  if (state.sortKey !== "market_cap_usd" || state.sortDir !== -1) {
    const k = KEY_SHORT[state.sortKey] || state.sortKey;
    const sign = state.sortDir === -1 ? "-" : "+";
    parts.push("s=" + sign + k);
  }
  const hash = parts.length ? "#" + parts.join("&") : "";
  history.replaceState(null, "", location.pathname + hash);
}

const fmtMcap = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return "—";
  const abs = Math.abs(v);
  if (abs >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T";
  if (abs >= 1e9)  return "$" + (v / 1e9).toFixed(2)  + "B";
  if (abs >= 1e6)  return "$" + (v / 1e6).toFixed(2)  + "M";
  return "$" + Math.round(v).toLocaleString();
};
const fmtPrice = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return "—";
  if (v >= 1000) return "$" + v.toLocaleString(undefined, { maximumFractionDigits: 0 });
  if (v >= 1) return "$" + v.toFixed(2);
  if (v >= 0.01) return "$" + v.toFixed(4);
  return "$" + v.toPrecision(3);
};
const fmtPct = (v) => {
  if (v === null || v === undefined || !isFinite(v)) return '<span class="muted">—</span>';
  const sign = v >= 0 ? "+" : "";
  const cls = v >= 0 ? "pos" : "neg";
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
};
const fmtDate = (unix) => {
  if (!unix) return "—";
  const d = new Date(unix * 1000);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
};

const TYPE_LABELS = {
  public: "Public", private: "Private", crypto: "Crypto",
  commodity: "Commodity", fiat: "Fiat M2", misc: "Misc",
};

const rowMap = new Map();

function methodIcon(method) {
  if (method === "stock") {
    return `<span class="method-icon" data-tip="Above-ground stock × spot price" aria-label="stock">`
      + `<svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor">`
      + `<rect x="3" y="11" width="10" height="2" rx="0.5"/><rect x="4" y="8" width="8" height="2" rx="0.5"/>`
      + `<rect x="5" y="5" width="6" height="2" rx="0.5"/></svg></span>`;
  }
  if (method === "flow") {
    return `<span class="method-icon" data-tip="Annual production × spot price" aria-label="flow">`
      + `<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">`
      + `<path d="M12.5 8 a4.5 4.5 0 1 1 -1.4 -3.2"/>`
      + `<path d="M12.5 3 L12.5 5.5 L10 5.5" stroke-linejoin="round"/></svg></span>`;
  }
  return "";
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function buildRow(a) {
  const tr = document.createElement("tr");
  tr.className = `category-${a.category}`;

  const cells = {};
  cells.rank  = tr.insertCell();
  cells.name  = tr.insertCell();
  cells.mcap  = tr.insertCell();
  cells.price = tr.insertCell();
  cells.ch24  = tr.insertCell();
  cells.ch7   = tr.insertCell();
  cells.ch30  = tr.insertCell();
  cells.ch1y  = tr.insertCell();

  const iconImg = a.icon_url
    ? `<img class="icon" src="${escapeHtml(a.icon_url)}" alt="" width="24" height="24" loading="lazy" onerror="this.setAttribute('data-fallback','1')">`
    : `<span class="icon" aria-hidden></span>`;

  // Synthetic tickers (GLOBAL_BONDS, OPENAI, GOLD…) get hidden — only public,
  // crypto, fiat have real exchange tickers worth showing.
  const showTicker = ["public", "crypto", "fiat"].includes(a.category) && a.ticker;
  const tkrRow =
    `<span class="tkr-row">` +
    (showTicker ? `<span class="tkr">${escapeHtml(a.ticker)}</span>` : "") +
    `<span class="tkr-type">${TYPE_LABELS[a.category] || a.category}</span>` +
    methodIcon(a.method) +
    `</span>`;

  // title= lets the user hover to see the full name when it's truncated
  // by ellipsis (and on touch devices, long-press surfaces it).
  const nameStr = a.name || "";
  cells.name.innerHTML =
    `<div class="name-cell">${iconImg}` +
    `<div class="name-stack">` +
    `<span class="name" title="${escapeHtml(nameStr)}">${escapeHtml(nameStr)}</span>` +
    tkrRow +
    `</div></div>`;

  return { tr, cells, lastCategory: a.category };
}

function updateRow(entry, a, rank) {
  if (entry.lastCategory !== a.category) {
    entry.tr.className = `category-${a.category}`;
    entry.lastCategory = a.category;
  }
  const c = entry.cells;
  c.rank.textContent  = rank;
  c.mcap.textContent  = fmtMcap(a.market_cap_usd);
  c.price.textContent = fmtPrice(a.price_usd);
  c.ch24.innerHTML    = fmtPct(a.change_24h);
  c.ch7.innerHTML     = fmtPct(a.change_7d);
  c.ch30.innerHTML    = fmtPct(a.change_30d);
  c.ch1y.innerHTML    = fmtPct(a.change_1y);
}

function render() {
  const q = state.query.trim().toLowerCase();
  const visible = state.assets.filter(a => {
    if (!state.filters[a.category]) return false;
    if (!q) return true;
    return (a.name || "").toLowerCase().includes(q)
        || (a.ticker || "").toLowerCase().includes(q);
  });

  // Rank by market cap among visible — Gold stays #3 even when sorting by name.
  const mcapRank = new Map();
  [...visible]
    .sort((a, b) => {
      const av = a.market_cap_usd, bv = b.market_cap_usd;
      const aNull = av == null || !isFinite(av);
      const bNull = bv == null || !isFinite(bv);
      if (aNull && bNull) return 0;
      if (aNull) return 1;
      if (bNull) return -1;
      return bv - av;
    })
    .forEach((a, i) => mcapRank.set(a, i + 1));

  const dir = state.sortDir;
  const key = state.sortKey;
  visible.sort((a, b) => {
    const av = a[key], bv = b[key];
    const aNull = av === null || av === undefined || (typeof av === "number" && !isFinite(av));
    const bNull = bv === null || bv === undefined || (typeof bv === "number" && !isFinite(bv));
    if (aNull && bNull) return 0;
    if (aNull) return 1;
    if (bNull) return -1;
    if (typeof av === "string" || typeof bv === "string") {
      return String(av).localeCompare(String(bv)) * dir;
    }
    return (av - bv) * dir;
  });

  const tbody = document.getElementById("rows");

  if (visible.length === 0) {
    rowMap.clear();
    const isLoading = state.lastUpdated === 0;
    const message = isLoading ? "Loading assets…" : "No assets match current filters.";
    const imgClass = isLoading ? "crest-empty crest-pulse" : "crest-empty";
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:48px 24px;color:var(--ink-mute);height:auto">
      <img src="/icons/casa-araoz.svg" alt="" width="64" height="64" class="${imgClass}"/>
      ${message}
    </td></tr>`;
    updateSortIndicators(visible);
    updateStatus();
    return;
  }

  if (rowMap.size === 0 && tbody.firstChild) tbody.innerHTML = "";

  const newRowCount = visible.reduce((n, a) => n + (rowMap.has(a.ticker) ? 0 : 1), 0);
  const CHUNK_THRESHOLD = 200;

  function processSlice(slice, baseIdx) {
    const frag = document.createDocumentFragment();
    for (let i = 0; i < slice.length; i++) {
      const a = slice[i];
      let entry = rowMap.get(a.ticker);
      if (!entry) {
        entry = buildRow(a);
        rowMap.set(a.ticker, entry);
      }
      updateRow(entry, a, mcapRank.get(a) || (baseIdx + i + 1));
      frag.appendChild(entry.tr);
    }
    tbody.appendChild(frag);
  }

  const visibleTickers = new Set(visible.map(a => a.ticker));
  for (const [ticker, entry] of rowMap) {
    if (!visibleTickers.has(ticker)) {
      entry.tr.remove();
      rowMap.delete(ticker);
    }
  }

  if (newRowCount > CHUNK_THRESHOLD) {
    // Detach all current rows before rebuilding. Without this, appendChild
    // on the head slice would move the new top-100 rows to the END of tbody
    // and leave stale rows (e.g. Corn, ONDO) at the visible top for a frame
    // until the idle callback fires.
    tbody.replaceChildren();
    const FIRST_PAINT = 100;
    processSlice(visible.slice(0, FIRST_PAINT), 0);
    if (visible.length > FIRST_PAINT) {
      const idleCb = window.requestIdleCallback || (cb => setTimeout(cb, 16));
      idleCb(() => processSlice(visible.slice(FIRST_PAINT), FIRST_PAINT));
    }
  } else {
    processSlice(visible, 0);
  }

  updateSortIndicators(visible);
  updateStatus();
  renderChips();
  renderHeroStats();
}

function updateSortIndicators(visible) {
  // Toggle data-sortable on columns whose value can be null for whole
  // categories. When the visible set has nothing for that column, the
  // header is inert (no sort glyph, no click).
  const dynamicKeys = ["price_usd", "change_24h", "change_7d", "change_30d", "change_1y"];
  const hasData = {};
  for (const k of dynamicKeys) {
    hasData[k] = visible ? visible.some(a => a[k] != null) : true;
  }
  document.querySelectorAll("#head th").forEach(th => {
    const oldMark = th.querySelector(".sort-mark");
    if (oldMark) oldMark.remove();

    const key = th.dataset.key;
    if (dynamicKeys.includes(key)) {
      if (hasData[key]) th.setAttribute("data-sortable", "1");
      else th.removeAttribute("data-sortable");
    }

    if (!th.dataset.sortable) return;
    const isActive = key === state.sortKey;
    const mark = document.createElement("span");
    mark.className = "sort-mark" + (isActive ? "" : " muted");
    mark.textContent = isActive ? (state.sortDir === -1 ? "▾" : "▴") : "↕";
    th.appendChild(mark);
    if (isActive) th.setAttribute("data-sort-active", "1");
    else th.removeAttribute("data-sort-active");
  });
}

function updateStatus() {
  const dot = document.getElementById("status-dot");
  const count = document.getElementById("status-count");
  const ago = state.lastUpdated
    ? Math.max(0, Math.round(Date.now() / 1000 - state.lastUpdated))
    : null;
  if (state.connected) {
    dot.classList.remove("err");
    dot.title = ago != null
      ? `Live — last update ${ago}s ago`
      : "Connecting…";
  } else {
    dot.classList.add("err");
    dot.title = `Lost connection — last data ${ago ?? "?"}s ago`;
  }
  count.textContent = `${state.assets.length.toLocaleString()} assets`;
}

function renderChips() {
  const counts = {};
  for (const c of ALL_CATS) counts[c] = 0;
  for (const a of state.assets) counts[a.category] = (counts[a.category] || 0) + 1;

  const container = document.getElementById("filters");
  if (!container.firstChild) {
    for (const cat of ALL_CATS) {
      const btn = document.createElement("button");
      btn.className = "ftr-chip";
      btn.dataset.cat = cat;
      btn.innerHTML =
        `<span class="ftr-chk" aria-hidden>` +
        `<svg width="9" height="9" viewBox="0 0 10 10">` +
        `<path d="M1.5 5 L4 7.5 L8.5 2.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>` +
        `</svg>` +
        `</span>` +
        `<span class="ftr-label">${CHIP_LABELS[cat]}</span>` +
        `<span class="ftr-count">0</span>`;
      btn.addEventListener("click", () => {
        state.filters[cat] = !state.filters[cat];
        persistState();
        render();
      });
      container.appendChild(btn);
    }
  }
  for (const btn of container.children) {
    const cat = btn.dataset.cat;
    btn.dataset.active = !!state.filters[cat];
    btn.querySelector(".ftr-count").textContent = counts[cat].toLocaleString();
  }
}

function renderHeroStats() {
  document.getElementById("hero-count").textContent =
    state.assets.length ? state.assets.length.toLocaleString() : "—";
  const totalMcap = state.assets.reduce(
    (s, a) => s + (typeof a.market_cap_usd === "number" ? a.market_cap_usd : 0), 0);
  document.getElementById("hero-mcap").textContent = totalMcap ? fmtMcap(totalMcap) : "—";
  document.getElementById("hero-updated").textContent = fmtDate(state.lastUpdated);
}

document.querySelectorAll("#head th").forEach(th => {
  th.addEventListener("click", () => {
    if (!th.dataset.sortable) return;
    const key = th.dataset.key;
    if (state.sortKey === key) state.sortDir *= -1;
    else { state.sortKey = key; state.sortDir = -1; }
    persistState();
    render();
  });
});

document.getElementById("search-input").addEventListener("input", e => {
  state.query = e.target.value;
  render();
});

async function refresh() {
  try {
    const r = await fetch("/api/assets");
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    state.assets = data.assets || [];
    state.lastUpdated = data.last_updated || 0;
    state.connected = true;
    render();
  } catch (e) {
    console.error("fetch failed", e);
    state.connected = false;
    updateStatus();
  }
}

loadInitialState();
renderChips();          // build chip DOM up-front so empty state still has them
render();               // paint the loading state immediately
refresh();
setInterval(refresh, 30000);
setInterval(updateStatus, 1000);
</script>
</body>
</html>
